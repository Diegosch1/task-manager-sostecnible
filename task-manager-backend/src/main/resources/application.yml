spring:
  datasource:
    url: jdbc:mysql://localhost:3306/taskmanager_db
    username: root
    password: ""
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        jdbc: 
          time_zone: America/Bogota
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

server:
  port: 8080

spring.web.cors:
  allowed-origins: "http://localhost:5173"

# Force JVM Timezone
spring.jmx.default-domain: taskmanager